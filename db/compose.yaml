version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: educolab_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: educolab

    ports:
      - "5437:5432"

    volumes:
      - postgres_data_educolab:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_educolab: