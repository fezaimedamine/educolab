spring.application.name=educolab

# ─── Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/educolab
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# Allow implicit cast from VARCHAR to PostgreSQL native enum types
spring.datasource.hikari.data-source-properties.stringtype=unspecified

# ─── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── JWT ────────────────────────────────────────────────────
app.jwt.secret=3d9a8f2c1b4e7d6a0123456789abcdef0123456789abcdef0123456789abcdef
app.jwt.expiration-ms=86400000

# ─── Server ─────────────────────────────────────────────────
server.port=8080

# ─── Docker ─────────────────────────────────────────────────
spring.docker.compose.file=../db/compose.yaml

# ─── Uploads ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
